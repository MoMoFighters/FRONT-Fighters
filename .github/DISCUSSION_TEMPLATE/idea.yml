title: "[IDEA] "
labels: ["idea"]
body:
  - type: markdown
    attributes:
      value: |
        ## 아이디어를 자유롭게 제안해주세요
        새로운 기능, 개선 아이디어 등 자유롭게 작성해주세요.

  - type: textarea
    id: idea
    attributes:
      label: 아이디어
      description: 어떤 아이디어인가요?
    validations:
      required: true

  - type: textarea
    id: motivation
    attributes:
      label: 제안 배경
      description: 왜 이 아이디어가 필요한가요?

  - type: textarea
    id: details
    attributes:
      label: 구체적인 내용
      description: 화면 시안, 동작 방식 등 구체적인 내용을 작성해주세요.

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료
