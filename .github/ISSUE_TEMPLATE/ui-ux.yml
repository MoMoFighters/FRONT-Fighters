name: 🎨 UI / UX
description: 디자인 또는 UI/UX 개선 이슈
title: "[UI] "
labels: ["ui-ux", "frontend"]
body:
  - type: markdown
    attributes:
      value: |
        ## UI / UX 개선 이슈입니다
        디자인, 사용성, 인터랙션 관련 개선 제안을 작성해주세요.

  - type: textarea
    id: target
    attributes:
      label: 개선 대상
      description: 어떤 화면 / 컴포넌트인가요?
    validations:
      required: true

  - type: textarea
    id: current
    attributes:
      label: 현재 상태
      description: 현재 어떤 문제가 있나요?
    validations:
      required: true

  - type: textarea
    id: improvement
    attributes:
      label: 개선 방향
    validations:
      required: true

  - type: textarea
    id: reference
    attributes:
      label: 참고 자료 / 시안
      description: Figma, 레퍼런스 사이트 등

  - type: dropdown
    id: priority
    attributes:
      label: 우선순위
      options:
        - High
        - Medium
        - Low
    validations:
      required: true
