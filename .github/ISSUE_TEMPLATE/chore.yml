name: 🔧 Chore
description: 설정 / 문서 / 기타 작업
title: "[CHORE] "
labels: ["chore", "frontend"]
body:
  - type: dropdown
    id: type
    attributes:
      label: 작업 유형
      options:
        - 설정 (config / build / lint)
        - 문서 (README / 주석 / 가이드)
        - 의존성 (패키지 추가/업데이트)
        - 기타
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: 작업 내용
    validations:
      required: true

  - type: textarea
    id: reason
    attributes:
      label: 작업 사유
